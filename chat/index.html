*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {

@keyframes glitch-2 {

@keyframes pdot { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }

#enter-btn:hover { color: #fff; box-shadow: 0 0 32px var(--accent-glow); }
#enter-btn:hover::before { transform: scaleX(1); }

/* HINT */
.hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); z-index: 10; opacity: 0; animation: fade-in 0.5s ease 2s forwards; pointer-events: none; }

/* PROGRESS */
.prog-wrap { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 20; }

#exit { position: fixed; inset: 0; z-index: 100; background: var(--bg); opacity: 0; pointer-events: none; transition: opacity 0.55s ease; }

@media (max-width: 640px) {
  .stream, .hud { display: none; }
  .corner { width: 28px; height: 28px; }

  .c-tl,.c-bl { left: 14px; } .c-tr,.c-br { right: 14px; }
}
</style>

const cv = document.getElementById('neural');

let W, H, nodes = [], mx = -999, my = -999;
const NC = 75, CD = 145, MD = 165;

function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
function mkNodes() {
  nodes = Array.from({length: NC}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
    r: Math.random()*1.5+.5, p: Math.random()*Math.PI*2,
  }));
}
function frame() {
  cx.clearRect(0,0,W,H);
  nodes.forEach(n => {
    n.x+=n.vx; n.y+=n.vy; n.p+=.018;
    if(n.x<0||n.x>W) n.vx*=-1;
    if(n.y<0||n.y>H) n.vy*=-1;

  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
    const a=nodes[i],b=nodes[j];

    const near=(Math.hypot(a.x-mx,a.y-my)<MD)||(Math.hypot(b.x-mx,b.y-my)<MD);

    cx.beginPath(); cx.moveTo(a.x,a.y); cx.lineTo(b.x,b.y);
    cx.strokeStyle=near?`rgba(34,197,94,${al*2})`:`rgba(59,130,246,${al})`;
    cx.lineWidth=near?1.2:.4; cx.stroke();

  nodes.forEach(n => {
    const near=Math.hypot(n.x-mx,n.y-my)<MD;
    const r=Math.max(0.1,n.r+Math.sin(n.p)*.5);
    const col=near?'34,197,94':'59,130,246';

    cx.fillStyle=`rgba(${col},${near?.9:.4+Math.sin(n.p)*.2})`; cx.fill();

    ecx.fillStyle=`rgba(${e.color},${a})`;

      ecx.beginPath();
      ecx.arc(e.x, e.y, e.r*4, 0, Math.PI*2);
      ecx.fillStyle=`rgba(${e.color},${a*.08})`;
      ecx.fill();

    d.textContent=t; el.appendChild(d);
    setTimeout(()=>{d.style.opacity='1';},1400+i*70);
    d.style.opacity='0'; d.style.transition='opacity .3s';
  });
}

/* ── HTML SANITIZER ── */
function sanitizeHtml(html) {
  const SAFE_TAGS = new Set(['B','STRONG','I','EM','SPAN','BR']);
  const SAFE_ATTRS = new Set(['class']);
  const doc = new DOMParser().parseFromString(html, 'text/html');
  (function clean(node) {
    for (const child of [...node.childNodes]) {
      if (child.nodeType === 1) {
        if (!SAFE_TAGS.has(child.tagName)) {
          child.replaceWith(document.createTextNode(child.textContent));
        } else {
          [...child.attributes].forEach(a => {
            if (!SAFE_ATTRS.has(a.name)) child.removeAttribute(a.name);
          });
          clean(child);
        }
      }
    }
  })(doc.body);
  return doc.body.innerHTML;
}

/* ── SEQUENCE ENGINE ── */
const SEQ=[
  { ey:'Standard AI', l1:'<span class="s">Your queries, their servers.</span>', l2:'<span class="s">Your data, their product.</span>', sb:'', dur:2400 },
  { ey:'The reality', l1:'<span class="d">Every prompt you send</span>', l2:'<span class="d">feeds <span class="a">someone else\'s</span> model.</span>', sb:'', dur:2400 },
  { ey:'A different idea', l1:'What if your AI', l2:'answered only to <span class="a">you?</span>', sb:'Not a cloud service. Not a subscription. Not a surveillance tool. A model that lives on your machine, serves your work, and forgets everything the moment you\'re done.', dur:3200 },
  { ey:'Your pet, not their pipeline', l1:'Zero data leaves', l2:'your <span class="a">machine. Ever.</span>', sb:'No telemetry. No analytics. No content logs. Cryptographic session wipe. Intrusion detection. Verified locally. Completely yours.', dur:3200, chips:true },
  { ey:'Air-gapped inference', l1:'Built for work that <span class="a">cannot</span>', l2:'afford a breach.', sb:'Federal investigations. Attorney-client privilege. Regulated financial data. Sensitive unclassified work product. Your AI stays in the room with you.', dur:0, chips:true, enter:true },
];

let idx=0, timer=null;
const ey=document.getElementById('ey'), l1=document.getElementById('l1'),
      l2=document.getElementById('l2'), sb=document.getElementById('sb'),
      ch=document.getElementById('ch'), btn=document.getElementById('enter-btn'),
      pb=document.getElementById('pb'), hint=document.getElementById('hint');

function show(i) {
  const s=SEQ[i];
  [ey,l1,l2,sb,ch].forEach(e=>e.classList.remove('vis'));
  btn.classList.remove('vis');

  setTimeout(()=>{
    ey.textContent=s.ey;
    l1.innerHTML=sanitizeHtml(s.l1||''); l2.innerHTML=sanitizeHtml(s.l2||''); sb.textContent=s.sb||'';
    l1.setAttribute('data-text',l1.textContent); l1.classList.add('glitch');
    l2.setAttribute('data-text',l2.textContent); l2.classList.add('glitch');
    requestAnimationFrame(()=>{
      setTimeout(()=>ey.classList.add('vis'),40);
      setTimeout(()=>l1.classList.add('vis'),160);
      setTimeout(()=>l2.classList.add('vis'),290);
      if(s.sb) setTimeout(()=>sb.classList.add('vis'),420);
      if(s.chips) setTimeout(()=>ch.classList.add('vis'),540);
      if(s.enter) {
        setTimeout(()=>{
          btn.style.display='inline-block';
          requestAnimationFrame(()=>btn.classList.add('vis'));
        },680);
        // Hide hint when enter shown
        hint.style.opacity='0';
      }
    });

    if(s.dur>0) {
      const from=i/SEQ.length*100, to=(i+1)/SEQ.length*100;
      const t0=Date.now();
      function tick(){ const p=Math.min((Date.now()-t0)/s.dur,1); pb.style.width=(from+(to-from)*p)+'%'; if(p<1) requestAnimationFrame(tick); }
      tick();
      timer=setTimeout(()=>{idx++;show(idx);},s.dur);
    } else { pb.style.width='100%'; }
  },320);
}

setTimeout(()=>show(0),1000);

function advance() {
  if(timer) clearTimeout(timer);
  if(idx<SEQ.length-1){ idx++; show(idx); }
}

document.getElementById('stage').addEventListener('click',e=>{
  if(e.target===btn||btn.contains(e.target)) return;
  advance();
});
document.addEventListener('keydown',e=>{
  if((e.key===' '||e.key==='ArrowRight')&&!e.target.closest('button')) { e.preventDefault(); advance(); }
  if(e.key==='Enter'&&btn.classList.contains('vis')) enter();
});


/* ── ENTER TRANSITION ── */
function enter() {
  const ex=document.getElementById('exit');
  btn.textContent='LOADING...';
  ex.classList.add('on');
  setTimeout(()=>{ window.location.href='main.html'; },600);
}
