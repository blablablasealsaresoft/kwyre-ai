apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kwyre
  labels:
    app: kwyre
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kwyre
  template:
    metadata:
      labels:
        app: kwyre
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kwyre
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-kwyre-config
          env:
            - name: KWYRE_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-kwyre-secrets
                  key: api-keys
            {{- if .Values.secrets.masterKey }}
            - name: KWYRE_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-kwyre-secrets
                  key: master-key
            {{- end }}
            {{- if .Values.secrets.licenseKey }}
            - name: KWYRE_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-kwyre-secrets
                  key: license-key
            {{- end }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: model-cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-kwyre-models
          {{- else }}
          emptyDir: {}
          {{- end }}
