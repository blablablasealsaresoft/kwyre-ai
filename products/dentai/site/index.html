<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DentAI — Dental Practice Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;
      --teal:#14b8a6;--teal-dim:rgba(20,184,166,.12);--teal-glow:rgba(20,184,166,.25);
      --text:#e6edf3;--text-dim:#7d8590;--white:#fff;
      --red:#f85149;--amber:#d29922;--green:#3fb950;--blue:#58a6ff;
      --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    input,select,textarea,button{font-family:inherit}

    header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{font-size:1.25rem;font-weight:700;color:var(--white);letter-spacing:-.02em}
    .logo span{color:var(--teal)}
    .conn{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--text-dim)}
    .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s}
    .conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}

    .shell{max-width:960px;margin:0 auto;padding:0 1rem}
    nav{display:flex;gap:0;margin:1rem 0;border-radius:8px;overflow-x:auto;border:1px solid var(--border);background:var(--surface)}
    nav button{flex:1;min-width:0;padding:.6rem .2rem;background:none;border:none;color:var(--text-dim);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    nav button:hover{color:var(--text);background:var(--surface2)}
    nav button.active{background:var(--teal);color:var(--white)}

    .tab{display:none}.tab.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
    .card h3{font-size:.95rem;color:var(--teal);margin-bottom:.75rem;font-weight:600}
    label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:.3rem;font-weight:500}
    input[type=text],input[type=number],textarea,select{width:100%;padding:.55rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s}
    input:focus,textarea:focus,select:focus{border-color:var(--teal)}
    textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:.8rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .btn{padding:.55rem 1.1rem;background:var(--teal);color:var(--white);border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .btn:hover{filter:brightness(1.15)}.btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:.4rem .8rem;font-size:.75rem}
    .btn-outline{background:transparent;border:1px solid var(--teal);color:var(--teal)}
    .btn-outline:hover{background:var(--teal-dim)}
    .actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}

    .output{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:.75rem;font-family:var(--mono);font-size:.8rem;white-space:pre-wrap;line-height:1.7;max-height:500px;overflow-y:auto;color:var(--text)}
    .output:empty{display:none}
    .output h4{color:var(--teal);margin:0 0 .3rem;font-size:.85rem}
    .badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
    .badge-low{background:rgba(63,185,80,.15);color:var(--green)}
    .badge-mod{background:rgba(210,153,34,.15);color:var(--amber)}
    .badge-high{background:rgba(248,81,73,.15);color:var(--red)}

    .check-group{display:flex;flex-wrap:wrap;gap:.5rem;margin:.4rem 0}
    .check-group label{display:flex;align-items:center;gap:.3rem;font-size:.8rem;color:var(--text);cursor:pointer;padding:.3rem .6rem;border:1px solid var(--border);border-radius:5px;transition:all .15s}
    .check-group label:hover{border-color:var(--teal)}
    .check-group input:checked+span{color:var(--teal)}
    .check-group input{accent-color:var(--teal)}

    .tooth-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:.5rem 0}
    .tooth-btn{padding:.35rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:.65rem;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--mono)}
    .tooth-btn.selected{background:var(--teal);color:var(--white);border-color:var(--teal)}
    .tooth-btn:hover{border-color:var(--teal)}

    .chat-box{display:flex;flex-direction:column;height:450px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
    .msg{max-width:80%;padding:.6rem .9rem;border-radius:10px;font-size:.84rem;line-height:1.5}
    .msg.user{align-self:flex-end;background:var(--teal);color:var(--white);border-bottom-right-radius:3px}
    .msg.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
    .msg.system{align-self:center;color:var(--text-dim);font-size:.75rem;font-style:italic}
    .chat-input{display:flex;gap:.5rem;padding:.75rem;border-top:1px solid var(--border);background:var(--surface2)}
    .chat-input input{flex:1;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none}
    .chat-input input:focus{border-color:var(--teal)}

    .table-wrap{overflow-x:auto;margin-top:.5rem}
    table{width:100%;border-collapse:collapse;font-size:.8rem}
    th{text-align:left;padding:.5rem .6rem;border-bottom:2px solid var(--border);color:var(--teal);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
    td{padding:.45rem .6rem;border-bottom:1px solid var(--border);color:var(--text)}
    tr:hover td{background:var(--teal-dim)}

    .loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{text-align:center;padding:2rem 1rem;color:var(--text-dim);font-size:.72rem;border-top:1px solid var(--border);margin-top:2rem}
    @media(max-width:640px){.row{grid-template-columns:1fr}nav{flex-wrap:wrap}nav button{flex:none;width:33.33%}.tooth-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<header>
  <div class="logo">Dent<span>AI</span></div>
  <div class="conn"><div class="conn-dot" id="connDot"></div><span id="connLabel">Connecting…</span></div>
</header>
<div class="shell">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<footer>&copy; 2026 Mint Rail LLC &middot; DentAI v1.0.0</footer>
<script>
const API=localStorage.getItem('dentai_api')||'http://localhost:8000';
const TABS=['Treatment Planner','Insurance Coding','Clinical Notes','Risk Assessment','Materials','Radiograph Analysis','AI Dentist'];
let activeTab=0,selectedTeeth=new Set();

const $=s=>document.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h)e.innerHTML=h;return e};

function initNav(){
  const nav=$('#nav');
  TABS.forEach((t,i)=>{
    const b=ce('button','',t);
    if(i===0)b.classList.add('active');
    b.onclick=()=>switchTab(i);
    nav.appendChild(b);
  });
}

function switchTab(i){
  activeTab=i;
  document.querySelectorAll('nav button').forEach((b,j)=>b.classList.toggle('active',i===j));
  renderTab(i);
}

const TEETH_UPPER=[18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28];
const TEETH_LOWER=[48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38];

function toothGrid(){
  let h='<label>Select Teeth (FDI)</label><div style="font-size:.7rem;color:var(--text-dim);margin-bottom:.3rem">Upper</div><div class="tooth-grid">';
  TEETH_UPPER.forEach(t=>{h+=`<div class="tooth-btn${selectedTeeth.has(t)?' selected':''}" onclick="toggleTooth(${t})">${t}</div>`;});
  h+='</div><div style="font-size:.7rem;color:var(--text-dim);margin:.3rem 0">Lower</div><div class="tooth-grid">';
  TEETH_LOWER.forEach(t=>{h+=`<div class="tooth-btn${selectedTeeth.has(t)?' selected':''}" onclick="toggleTooth(${t})">${t}</div>`;});
  h+='</div>';return h;
}
function toggleTooth(t){selectedTeeth.has(t)?selectedTeeth.delete(t):selectedTeeth.add(t);renderTab(activeTab);}

function checkboxGroup(name,items){
  let h='<div class="check-group">';
  items.forEach(it=>{h+=`<label><input type="checkbox" name="${name}" value="${it}"><span>${it}</span></label>`;});
  return h+'</div>';
}

function getChecked(name){return[...document.querySelectorAll(`input[name="${name}"]:checked`)].map(c=>c.value);}

function renderTab(i){
  const m=$('#main');
  const tabs=[renderTreatment,renderCoding,renderNotes,renderRisk,renderMaterials,renderRadiograph,renderChat];
  m.innerHTML='';const d=ce('div','tab active');tabs[i](d);m.appendChild(d);
}

function renderTreatment(el){
  el.innerHTML=`<div class="card"><h3>AI Treatment Planner</h3>
    ${toothGrid()}
    <label style="margin-top:.6rem">Symptoms</label>
    ${checkboxGroup('symptoms',['Toothache','Sensitivity to hot','Sensitivity to cold','Swelling','Bleeding gums','Bad breath','Loose tooth','Broken tooth','Discoloration','Jaw pain'])}
    <label style="margin-top:.5rem">Clinical Findings</label>
    ${checkboxGroup('findings',['Caries','Fracture','Abscess','Bone loss','Gingival recession','Mobility','Pulp exposure','Root resorption','Calculus','Plaque'])}
    <div class="row" style="margin-top:.6rem"><div><label>Patient Age</label><input type="number" id="tpAge" value="35" min="1" max="120"></div>
    <div><label>Medical History</label><input type="text" id="tpHx" placeholder="e.g. diabetes, blood thinners"></div></div>
    <div class="actions"><button class="btn" onclick="runTreatmentPlan()">Generate Treatment Plan</button>
    <button class="btn btn-outline" onclick="runLocalTreatment()">Quick Local Plan</button></div>
    <div class="output" id="tpOut"></div></div>`;
}

async function runTreatmentPlan(){
  const o=$('#tpOut');o.textContent='Generating AI treatment plan…';
  const body={symptoms:getChecked('symptoms'),findings:getChecked('findings'),tooth_numbers:[...selectedTeeth].map(String),patient_age:+$('#tpAge').value||35,medical_history:$('#tpHx').value};
  if(!body.symptoms.length){o.textContent='Please select at least one symptom.';return;}
  try{const r=await fetch(API+'/v1/ai/treatment-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();o.textContent=d.treatment_plan||d.error||'No response';}catch(e){o.textContent='API offline. Use Quick Local Plan for demo data.';}
}

async function runLocalTreatment(){
  const symptoms=getChecked('symptoms'),teeth=[...selectedTeeth].map(String);
  if(!symptoms.length){$('#tpOut').textContent='Select at least one symptom.';return;}
  try{const r=await fetch(API+'/v1/treatment/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symptoms,teeth:teeth.length?teeth:['14'],patient_age:+$('#tpAge').value||35})});const d=await r.json();$('#tpOut').textContent=JSON.stringify(d,null,2);}
  catch{$('#tpOut').textContent=`Demo Treatment Plan\n━━━━━━━━━━━━━━━━━\nSymptoms: ${symptoms.join(', ')}\nTeeth: ${teeth.join(', ')||'General'}\n\nDiagnosis: Requires clinical evaluation\nPhase 1: Acute care — address pain/infection\nPhase 2: Definitive treatment\nPhase 3: Maintenance and follow-up\n\nNote: Connect to API for detailed plans.`;}
}

function renderCoding(el){
  el.innerHTML=`<div class="card"><h3>CDT Insurance Coding</h3>
    <label>Procedure Description</label><textarea id="cdtProc" rows="3" placeholder="Describe the procedure performed…">Porcelain crown on tooth #14 due to extensive caries with pulp involvement, previously treated with root canal therapy</textarea>
    <div class="row" style="margin-top:.5rem"><div><label>Diagnosis</label><input type="text" id="cdtDx" placeholder="e.g. K02.9 Dental caries"></div>
    <div><label>Tooth Numbers</label><input type="text" id="cdtTeeth" placeholder="e.g. 14, 15"></div></div>
    <div class="actions"><button class="btn" onclick="runCoding()">Get CDT Codes & Rationale</button></div>
    <div class="output" id="cdtOut"></div></div>`;
}

async function runCoding(){
  const o=$('#cdtOut');o.textContent='Analyzing procedure for CDT codes…';
  const body={procedure_description:$('#cdtProc').value,diagnosis:$('#cdtDx').value,tooth_numbers:$('#cdtTeeth').value.split(',').map(s=>s.trim()).filter(Boolean)};
  try{const r=await fetch(API+'/v1/ai/coding-rationale',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();o.textContent=d.coding_rationale||d.error||'No response';}
  catch{o.textContent=`Demo CDT Coding\n━━━━━━━━━━━━━━\nProcedure: ${body.procedure_description.substring(0,60)}…\n\nD2740 — Crown, porcelain/ceramic substrate\n  Rationale: Extensive caries necessitating full-coverage restoration\n  Documentation: Pre-op radiograph, caries documentation\n\nD3330 — Root canal, molar (if applicable)\n  Rationale: Pulp involvement confirmed\n\nConnect to API for full AI-powered coding analysis.`;}
}

function renderNotes(el){
  el.innerHTML=`<div class="card"><h3>Clinical Notes Generator</h3>
    <label>Visit Bullet Points (one per line)</label>
    <textarea id="notesBullets" rows="6" placeholder="Patient reports pain upper left for 3 days\nSensitive to cold\nPE: #26 occlusal caries, probing depths normal\nRadiograph: radiolucency approaching pulp\nTx: composite restoration planned">Patient reports pain upper left for 3 days\nSensitive to cold and chewing\nPE: #26 large occlusal caries\nRadiograph shows radiolucency near pulp\nComposite restoration performed\nPost-op instructions given</textarea>
    <div class="row" style="margin-top:.5rem"><div><label>Visit Type</label><select id="notesType"><option value="routine">Routine</option><option value="emergency">Emergency</option><option value="follow_up">Follow-up</option><option value="consultation">Consultation</option></select></div>
    <div><label>Provider Name</label><input type="text" id="notesDoc" placeholder="Dr. Smith"></div></div>
    <div class="actions"><button class="btn" onclick="runNotes()">Generate SOAP Note</button></div>
    <div class="output" id="notesOut"></div></div>`;
}

async function runNotes(){
  const o=$('#notesOut');o.textContent='Generating clinical note…';
  const bullets=$('#notesBullets').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(!bullets.length){o.textContent='Enter at least one bullet point.';return;}
  const body={bullet_points:bullets,visit_type:$('#notesType').value,provider_name:$('#notesDoc').value};
  try{const r=await fetch(API+'/v1/ai/clinical-notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();o.textContent=d.soap_note||d.error||'No response';}
  catch{o.textContent=`SOAP NOTE — ${body.visit_type.toUpperCase()}\n${'━'.repeat(40)}\n\nSUBJECTIVE:\nPatient presents with chief complaint as noted.\n${bullets.slice(0,2).map(b=>'• '+b).join('\n')}\n\nOBJECTIVE:\nClinical examination findings documented.\n${bullets.slice(2,4).map(b=>'• '+b).join('\n')}\n\nASSESSMENT:\nClinical findings consistent with reported symptoms.\n\nPLAN:\n${bullets.slice(4).map(b=>'• '+b).join('\n')||'• Treatment plan to be determined'}\n\nConnect to API for AI-generated SOAP notes.`;}
}

function renderRisk(el){
  el.innerHTML=`<div class="card"><h3>Risk Assessment</h3>
    <label>Procedure</label><input type="text" id="riskProc" placeholder="e.g. implant, extraction, root canal" value="implant">
    <label style="margin-top:.5rem">Patient Factors</label>
    <div class="row"><div><label>Age</label><input type="number" id="riskAge" value="55" min="1" max="120"></div>
    <div><label>ASA Class</label><select id="riskASA"><option value="1">I - Normal healthy</option><option value="2" selected>II - Mild systemic</option><option value="3">III - Severe systemic</option><option value="4">IV - Life-threatening</option></select></div></div>
    <div class="check-group" style="margin-top:.5rem">
      <label><input type="checkbox" name="rf" value="smoker"><span>Smoker</span></label>
      <label><input type="checkbox" name="rf" value="diabetic"><span>Diabetic</span></label>
      <label><input type="checkbox" name="rf" value="immunocompromised"><span>Immunocompromised</span></label>
      <label><input type="checkbox" name="rf" value="blood_thinners"><span>Blood Thinners</span></label>
      <label><input type="checkbox" name="rf" value="pregnancy"><span>Pregnancy</span></label>
      <label><input type="checkbox" name="rf" value="periodontal_disease"><span>Periodontal Disease</span></label>
    </div>
    <div class="actions"><button class="btn" onclick="runRisk()">Assess Risk</button></div>
    <div class="output" id="riskOut"></div></div>`;
}

async function runRisk(){
  const o=$('#riskOut');o.textContent='Assessing risk…';
  const factors=getChecked('rf');const pf={age:+$('#riskAge').value,asa_class:+$('#riskASA').value};
  factors.forEach(f=>pf[f]=true);
  const body={procedure:$('#riskProc').value,patient_factors:pf};
  try{const r=await fetch(API+'/v1/risk/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();
    const badge=d.risk_score<=2?'low':d.risk_score<=4.5?'mod':'high';
    o.innerHTML=`<h4>${d.procedure} — Risk Assessment</h4>Score: <span class="badge badge-${badge}">${d.risk_score}/10 ${d.risk_level}</span>\n\nFactors:\n${d.factors.map(f=>'• '+f).join('\n')}\n\nRecommendations:\n${d.recommendations.map(r=>'• '+r).join('\n')}${d.contraindications.length?'\n\nContraindications:\n'+d.contraindications.map(c=>'⚠ '+c).join('\n'):''}`;
  }catch{o.textContent='API offline. Connect server for risk assessment.';}
}

function renderMaterials(el){
  el.innerHTML=`<div class="card"><h3>Material Recommendations</h3>
    <label>Procedure</label><select id="matProc"><option>Crown</option><option>Filling</option><option>Implant</option><option>Veneer</option><option>Denture</option></select>
    <div class="row" style="margin-top:.5rem"><div><label>Tooth Location</label><input type="text" id="matLoc" placeholder="e.g. anterior, molar"></div>
    <div><label>Patient Age</label><input type="number" id="matAge" value="40"></div></div>
    <label style="margin-top:.3rem"><input type="checkbox" id="matAesth"> Prioritize Aesthetics</label>
    <div class="actions"><button class="btn" onclick="runMaterials()">Get Recommendations</button></div>
    <div id="matOut"></div></div>`;
}

async function runMaterials(){
  const o=$('#matOut');o.innerHTML='<div class="loading"></div>';
  const body={procedure:$('#matProc').value,tooth_location:$('#matLoc').value,patient_age:+$('#matAge').value,aesthetic_priority:$('#matAesth').checked};
  try{const r=await fetch(API+'/v1/materials/recommend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();
    let h=`<div class="output"><h4>${d.recommendation}</h4></div><div class="table-wrap"><table><tr><th>Material</th><th>Type</th><th>Cost</th><th>Longevity</th><th>Best For</th></tr>`;
    d.materials.forEach(m=>{h+=`<tr><td><strong>${m.name}</strong></td><td>${m.type}</td><td>${m.estimated_cost_range}</td><td>${m.longevity_years} yrs</td><td>${m.best_for}</td></tr>`;});
    o.innerHTML=h+'</table></div>';
  }catch{o.innerHTML='<div class="output">API offline. Connect server for material data.</div>';}
}

function renderRadiograph(el){
  el.innerHTML=`<div class="card"><h3>Radiograph Analysis</h3>
    <label>Radiograph Type</label><select id="radType"><option value="periapical">Periapical</option><option value="panoramic">Panoramic</option><option value="bitewing">Bitewing</option><option value="cbct">CBCT</option><option value="cephalometric">Cephalometric</option></select>
    <label style="margin-top:.5rem">Describe Radiographic Findings</label>
    <textarea id="radFindings" rows="5" placeholder="Describe what you observe on the radiograph…">Periapical radiograph of tooth #30 showing a well-defined radiolucency at the apex approximately 3mm in diameter. Loss of lamina dura around the apex. No root resorption noted. Adjacent teeth appear normal.</textarea>
    <div class="actions"><button class="btn" onclick="runRadiograph()">Analyze Findings</button></div>
    <div class="output" id="radOut"></div></div>`;
}

async function runRadiograph(){
  const o=$('#radOut');o.textContent='Analyzing radiograph findings…';
  const body={findings_description:$('#radFindings').value,radiograph_type:$('#radType').value};
  if(body.findings_description.length<10){o.textContent='Please describe the radiographic findings (min 10 characters).';return;}
  try{const r=await fetch(API+'/v1/ai/radiograph-analysis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();o.textContent=d.analysis||d.error||'No response';}
  catch{o.textContent=`Demo Radiograph Analysis\n${'━'.repeat(35)}\nType: ${body.radiograph_type}\n\nInterpretation:\nFindings suggest periapical pathology consistent with pulp necrosis.\n\nDifferential Diagnosis:\n1. Periapical abscess\n2. Periapical granuloma\n3. Periapical cyst\n\nRecommendations:\n• Vitality testing recommended\n• Consider CBCT for 3D assessment\n• Root canal therapy likely indicated\n\nConnect to API for detailed AI analysis.`;}
}

let chatHistory=[];
function renderChat(el){
  el.innerHTML=`<div class="card"><h3>AI Dental Assistant</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:.75rem">Ask any dental question — treatment options, patient management, clinical guidelines, or coding queries.</p>
    <div class="chat-box"><div class="chat-messages" id="chatMsgs"><div class="msg system">Hello! I'm your AI dental assistant. Ask me anything about dental care, treatment planning, coding, or clinical guidelines.</div></div>
    <div class="chat-input"><input type="text" id="chatIn" placeholder="Ask a dental question…" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-sm" onclick="sendChat()">Send</button></div></div></div>`;
  chatHistory.forEach(m=>{const d=ce('div','msg '+(m.role==='user'?'user':'ai'),m.text);$('#chatMsgs').appendChild(d);});
}

async function sendChat(){
  const inp=$('#chatIn'),txt=inp.value.trim();if(!txt)return;inp.value='';
  chatHistory.push({role:'user',text:txt});
  const msgs=$('#chatMsgs');msgs.appendChild(ce('div','msg user',txt));
  const thinking=ce('div','msg ai','<div class="loading"></div> Thinking…');msgs.appendChild(thinking);msgs.scrollTop=msgs.scrollHeight;
  try{
    const r=await fetch(API+'/v1/ai/patient-education',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({treatment:txt,patient_age:35,language_level:'moderate'})});
    const d=await r.json();const reply=d.education||d.error||'No response';
    thinking.innerHTML=reply.replace(/\n/g,'<br>');chatHistory.push({role:'ai',text:reply});
  }catch{thinking.innerHTML='I\'m currently offline. Please ensure the DentAI server is running and try again.';chatHistory.push({role:'ai',text:'Offline — server not connected.'});}
  msgs.scrollTop=msgs.scrollHeight;
}

async function checkHealth(){
  try{const r=await fetch(API+'/health');if(r.ok){$('#connDot').classList.add('ok');$('#connLabel').textContent='Connected';return;}}catch{}
  $('#connDot').classList.remove('ok');$('#connLabel').textContent='Offline';
}

initNav();renderTab(0);checkHealth();setInterval(checkHealth,15000);
</script>
</body>
</html>
