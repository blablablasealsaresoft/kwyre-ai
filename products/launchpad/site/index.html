<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaunchPad — AI Career Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0b1120;--surface:#111827;--surface2:#1e293b;--border:rgba(148,163,184,.12);
      --blue:#3b82f6;--blue-dim:#2563eb;--blue-glow:rgba(59,130,246,.12);
      --amber:#f59e0b;--amber-dim:rgba(245,158,11,.12);
      --text:#f1f5f9;--text-dim:#94a3b8;--white:#fff;
      --green:#22c55e;--red:#ef4444;
      --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    input,select,textarea,button{font-family:inherit}

    header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{font-size:1.2rem;font-weight:800;color:var(--white)}.logo span{color:var(--amber)}
    .conn{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text-dim)}
    .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s}
    .conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}

    .shell{max-width:960px;margin:0 auto;padding:0 1rem}
    nav{display:flex;gap:0;margin:1rem 0;border-radius:8px;overflow-x:auto;border:1px solid var(--border);background:var(--surface)}
    nav button{flex:1;min-width:0;padding:.6rem .15rem;background:none;border:none;color:var(--text-dim);font-size:.7rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    nav button:hover{color:var(--text);background:var(--surface2)}
    nav button.active{background:var(--blue);color:var(--white)}

    .tab{display:none}.tab.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
    .card h3{font-size:.95rem;color:var(--blue);margin-bottom:.75rem;font-weight:700}
    label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:.3rem;font-weight:500}
    input[type=text],input[type=number],textarea,select{width:100%;padding:.55rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s}
    input:focus,textarea:focus,select:focus{border-color:var(--blue)}
    textarea{resize:vertical;min-height:100px;font-family:var(--mono);font-size:.8rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .btn{padding:.55rem 1.1rem;background:var(--blue);color:var(--white);border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .btn:hover{filter:brightness(1.15)}.btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:.4rem .8rem;font-size:.75rem}
    .btn-amber{background:var(--amber);color:#000}
    .btn-outline{background:transparent;border:1px solid var(--blue);color:var(--blue)}
    .btn-outline:hover{background:var(--blue-glow)}
    .actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
    .output{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:.75rem;font-family:var(--mono);font-size:.8rem;white-space:pre-wrap;line-height:1.7;max-height:500px;overflow-y:auto}
    .output:empty{display:none}

    .gauge-wrap{display:flex;align-items:center;justify-content:center;margin:1rem 0}
    .gauge{position:relative;width:140px;height:140px}
    .gauge svg{transform:rotate(-90deg)}
    .gauge-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .gauge-score{font-size:2rem;font-weight:800;color:var(--blue)}
    .gauge-text{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}

    .job-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.6rem;transition:border .2s}
    .job-card:hover{border-color:var(--blue)}
    .job-header{display:flex;justify-content:space-between;align-items:flex-start}
    .job-header h4{font-size:.9rem;margin:0;color:var(--white)}.job-header .match-pct{font-size:.8rem;font-weight:700;color:var(--amber)}
    .job-meta{font-size:.75rem;color:var(--text-dim);margin:.3rem 0}
    .job-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
    .job-tag{padding:.15rem .5rem;border-radius:4px;font-size:.68rem;font-weight:600;background:var(--blue-glow);color:var(--blue)}

    .interview-q{background:var(--surface2);border-left:3px solid var(--blue);padding:.8rem 1rem;border-radius:0 8px 8px 0;margin-bottom:.6rem}
    .interview-q .q-type{font-size:.68rem;color:var(--amber);text-transform:uppercase;font-weight:700;margin-bottom:.2rem}
    .interview-q .q-text{font-size:.88rem;color:var(--white)}

    .chat-box{display:flex;flex-direction:column;height:420px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
    .msg{max-width:80%;padding:.6rem .9rem;border-radius:10px;font-size:.84rem;line-height:1.5}
    .msg.user{align-self:flex-end;background:var(--blue);color:var(--white);border-bottom-right-radius:3px}
    .msg.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
    .msg.system{align-self:center;color:var(--text-dim);font-size:.75rem;font-style:italic}
    .chat-input{display:flex;gap:.5rem;padding:.75rem;border-top:1px solid var(--border);background:var(--surface2)}
    .chat-input input{flex:1;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none}
    .chat-input input:focus{border-color:var(--blue)}

    .loading{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{text-align:center;padding:2rem 1rem;color:var(--text-dim);font-size:.72rem;border-top:1px solid var(--border);margin-top:2rem}
    @media(max-width:640px){.row{grid-template-columns:1fr}nav{flex-wrap:wrap}nav button{flex:none;width:25%}}
  </style>
</head>
<body>
<header>
  <div class="logo">Launch<span>Pad</span></div>
  <div class="conn"><div class="conn-dot" id="connDot"></div><span id="connLabel">Connecting…</span></div>
</header>
<div class="shell">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<footer>&copy; 2026 Mint Rail LLC &middot; LaunchPad v1.0.0</footer>
<script>
const API=localStorage.getItem('launchpad_api')||'http://localhost:8000';
const TABS=['Resume Analyzer','Resume Optimizer','Cover Letter','Interview Coach','Job Matcher','Salary Negotiator','AI Career Coach'];
let activeTab=0,chatHistory=[];

const SAMPLE_RESUME=`JANE DOE
Senior Software Engineer | jane.doe@email.com | (555) 123-4567

EXPERIENCE
Senior Software Engineer — Acme Corp (2021–Present)
• Led migration of monolith to microservices, reducing deployment time by 60%
• Architected real-time data pipeline processing 2M events/day using Kafka
• Mentored 4 junior engineers, all promoted within 18 months

Software Engineer — StartupXYZ (2018–2021)
• Built React dashboard serving 50K daily active users
• Implemented CI/CD pipeline reducing release cycles from weekly to daily
• Optimized API response times by 40% through caching and query optimization

EDUCATION
B.S. Computer Science — MIT (2018)

SKILLS
Python, JavaScript, React, Node.js, AWS, Docker, Kubernetes, PostgreSQL, Redis`;

const $=s=>document.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h)e.innerHTML=h;return e};

function initNav(){
  const nav=$('#nav');
  TABS.forEach((t,i)=>{const b=ce('button','',t);if(i===0)b.classList.add('active');b.onclick=()=>switchTab(i);nav.appendChild(b);});
}
function switchTab(i){activeTab=i;document.querySelectorAll('nav button').forEach((b,j)=>b.classList.toggle('active',i===j));renderTab(i);}
function renderTab(i){const m=$('#main');m.innerHTML='';const d=ce('div','tab active');[renderAnalyzer,renderOptimizer,renderCoverLetter,renderInterview,renderJobMatch,renderSalary,renderChat][i](d);m.appendChild(d);}

function gaugeHTML(score){
  const r=60,c=2*Math.PI*r,pct=score/100,offset=c*(1-pct);
  const color=score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)';
  return`<div class="gauge-wrap"><div class="gauge"><svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="10"/><circle cx="70" cy="70" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset .8s ease"/></svg><div class="gauge-label"><div class="gauge-score" style="color:${color}">${score}</div><div class="gauge-text">ATS Score</div></div></div></div>`;
}

function renderAnalyzer(el){
  el.innerHTML=`<div class="card"><h3>Resume Analyzer</h3>
    <label>Paste Your Resume</label><textarea id="resText" rows="10">${SAMPLE_RESUME}</textarea>
    <label style="margin-top:.5rem">Target Job Description (optional)</label><textarea id="resJD" rows="4" placeholder="Paste the job description to check keyword alignment…"></textarea>
    <div class="actions"><button class="btn" onclick="analyzeResume()">Analyze Resume</button></div>
    <div id="resOut"></div></div>`;
}

async function analyzeResume(){
  const o=$('#resOut');o.innerHTML='<div class="loading" style="margin:1rem auto;display:block"></div>';
  const body={resume_text:$('#resText').value,job_description:$('#resJD').value};
  try{const r=await fetch(API+'/v1/resume/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();
    o.innerHTML=gaugeHTML(d.ats_score)+`<div class="output"><h4 style="color:var(--blue);margin-bottom:.4rem">Breakdown</h4>Keyword Match: ${d.breakdown.keyword_match}%\nFormatting: ${d.breakdown.formatting}%\nAchievements: ${d.breakdown.achievements}%\nAction Verbs: ${d.breakdown.action_verbs}%\n\nSections Found: ${d.sections_found.join(', ')}\n${d.missing_keywords.length?'\nMissing Keywords: '+d.missing_keywords.join(', '):''}\n\nImprovements:\n${d.improvements.map(i=>'• '+i).join('\n')}</div>`;
  }catch{o.innerHTML=gaugeHTML(72)+`<div class="output">Demo Analysis (offline)\n\nKeyword Match: 68%\nFormatting: 80%\nAchievements: 75%\n\nConnect to API for full analysis.</div>`;}
}

function renderOptimizer(el){
  el.innerHTML=`<div class="card"><h3>AI Resume Optimizer</h3>
    <label>Your Resume</label><textarea id="optRes" rows="8">${SAMPLE_RESUME}</textarea>
    <label style="margin-top:.5rem">Target Role</label><input type="text" id="optRole" placeholder="e.g. Senior Backend Engineer" value="Staff Software Engineer">
    <label style="margin-top:.3rem">Target Company</label><input type="text" id="optCo" placeholder="e.g. Google (optional)">
    <div class="actions"><button class="btn" onclick="optimizeResume()">Rewrite Resume with AI</button></div>
    <div class="output" id="optOut"></div></div>`;
}

async function optimizeResume(){
  const o=$('#optOut');o.textContent='AI is rewriting your resume…';
  try{const r=await fetch(API+'/v1/ai/resume-rewrite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume_text:$('#optRes').value,target_role:$('#optRole').value,target_company:$('#optCo').value})});const d=await r.json();o.textContent=d.rewritten_resume||d.error||'No response';}
  catch{o.textContent='Connect to API for AI resume rewriting.';}
}

function renderCoverLetter(el){
  el.innerHTML=`<div class="card"><h3>AI Cover Letter Generator</h3>
    <label>Your Resume</label><textarea id="clRes" rows="6">${SAMPLE_RESUME}</textarea>
    <label style="margin-top:.5rem">Job Description</label><textarea id="clJD" rows="5" placeholder="Paste the full job description…">We are looking for a Staff Software Engineer to lead our platform engineering team. You will design scalable distributed systems, mentor engineers, and drive technical strategy. Required: 5+ years experience, strong in Python/Go, cloud infrastructure (AWS/GCP), and distributed systems.</textarea>
    <div class="row" style="margin-top:.5rem"><div><label>Company Name</label><input type="text" id="clCo" placeholder="e.g. Acme Inc"></div>
    <div><label>Tone</label><select id="clTone"><option value="professional">Professional</option><option value="enthusiastic">Enthusiastic</option><option value="conversational">Conversational</option></select></div></div>
    <div class="actions"><button class="btn" onclick="genCoverLetter()">Generate with AI</button><button class="btn btn-outline" onclick="genLocalCover()">Quick Generate</button></div>
    <div class="output" id="clOut"></div></div>`;
}

async function genCoverLetter(){
  const o=$('#clOut');o.textContent='Crafting your cover letter…';
  try{const r=await fetch(API+'/v1/ai/cover-letter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume_text:$('#clRes').value,job_description:$('#clJD').value,company_name:$('#clCo').value,tone:$('#clTone').value})});const d=await r.json();o.textContent=d.cover_letter||d.error||'No response';}
  catch{o.textContent='Connect to API for AI cover letter generation.';}
}
async function genLocalCover(){
  const o=$('#clOut');o.textContent='Generating…';
  try{const r=await fetch(API+'/v1/cover-letter/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume_text:$('#clRes').value,job_description:$('#clJD').value,tone:$('#clTone').value})});const d=await r.json();o.textContent=d.cover_letter||'No response';}
  catch{o.textContent='API offline. Use AI Generate with server connected.';}
}

function renderInterview(el){
  el.innerHTML=`<div class="card"><h3>AI Interview Coach</h3>
    <div class="row"><div><label>Target Role</label><input type="text" id="ivRole" value="Software Engineer"></div>
    <div><label>Level</label><select id="ivLevel"><option value="junior">Junior</option><option value="mid" selected>Mid</option><option value="senior">Senior</option><option value="staff">Staff</option></select></div></div>
    <div class="actions" style="margin-top:.5rem"><button class="btn" onclick="genQuestions()">Generate Practice Questions</button></div>
    <div id="ivQuestions"></div>
    <h3 style="margin-top:1.5rem">Practice & Get Feedback</h3>
    <label>Interview Question</label><input type="text" id="ivQ" placeholder="Enter or pick a question above" value="Tell me about a time you led a difficult technical project">
    <label style="margin-top:.5rem">Your Answer</label><textarea id="ivA" rows="5" placeholder="Type your answer here for AI feedback…"></textarea>
    <div class="actions"><button class="btn" onclick="getCoaching()">Get AI Coaching</button></div>
    <div class="output" id="ivOut"></div></div>`;
}

async function genQuestions(){
  const o=$('#ivQuestions');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  try{const r=await fetch(API+'/v1/interview/prepare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:$('#ivRole').value.toLowerCase().replace(/ /g,'_'),level:$('#ivLevel').value,count:6})});const d=await r.json();
    o.innerHTML=d.questions.map(q=>`<div class="interview-q" onclick="document.getElementById('ivQ').value='${q.question.replace(/'/g,"\\'")}'" style="cursor:pointer"><div class="q-type">${q.category}</div><div class="q-text">${q.question}</div></div>`).join('');
  }catch{o.innerHTML=['Tell me about yourself','Describe a challenging bug you solved','How do you handle disagreements with teammates?','Walk me through your system design process','What\'s your greatest technical achievement?','Why should we hire you?'].map(q=>`<div class="interview-q" onclick="document.getElementById('ivQ').value='${q}'" style="cursor:pointer"><div class="q-type">Practice</div><div class="q-text">${q}</div></div>`).join('');}
}

async function getCoaching(){
  const o=$('#ivOut');o.textContent='Getting AI coaching feedback…';
  try{const r=await fetch(API+'/v1/ai/interview-coach',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:$('#ivRole').value,question:$('#ivQ').value,your_answer:$('#ivA').value,level:$('#ivLevel').value})});const d=await r.json();o.textContent=d.coaching||d.error||'No response';}
  catch{o.textContent='Connect to API for AI interview coaching.';}
}

function renderJobMatch(el){
  el.innerHTML=`<div class="card"><h3>Job Matcher</h3>
    <label>Your Skills (comma-separated)</label><input type="text" id="jmSkills" value="Python, JavaScript, React, AWS, Docker, PostgreSQL">
    <div class="row" style="margin-top:.5rem"><div><label>Experience (years)</label><input type="number" id="jmExp" value="5" min="0"></div>
    <div><label>Preferred Location</label><input type="text" id="jmLoc" placeholder="e.g. Remote, San Francisco"></div></div>
    <div class="row" style="margin-top:.3rem"><div><label>Min Salary ($)</label><input type="number" id="jmSalMin" value="120000"></div>
    <div><label>Max Salary ($)</label><input type="number" id="jmSalMax" value="200000"></div></div>
    <div class="actions"><button class="btn" onclick="matchJobs()">Find Matching Jobs</button></div>
    <div id="jmOut"></div></div>`;
}

async function matchJobs(){
  const o=$('#jmOut');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  const skills=$('#jmSkills').value.split(',').map(s=>s.trim()).filter(Boolean);
  try{const r=await fetch(API+'/v1/match/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skills,experience_years:+$('#jmExp').value,preferred_locations:[$('#jmLoc').value].filter(Boolean),salary_min:+$('#jmSalMin').value,salary_max:+$('#jmSalMax').value,limit:8})});const d=await r.json();
    o.innerHTML=d.matches.map(j=>`<div class="job-card"><div class="job-header"><h4>${j.title}</h4><span class="match-pct">${j.match_score}% match</span></div><div class="job-meta">${j.company} · ${j.location} · $${(j.salary_min/1000).toFixed(0)}K–$${(j.salary_max/1000).toFixed(0)}K</div><div class="job-tags">${j.matching_skills.map(s=>`<span class="job-tag">${s}</span>`).join('')}</div></div>`).join('');
  }catch{o.innerHTML=[{title:'Senior Software Engineer',company:'TechCorp',location:'Remote',match:92,salary:'140K–180K',skills:['Python','AWS','Docker']},{title:'Staff Engineer',company:'StartupAI',location:'San Francisco',match:87,salary:'160K–220K',skills:['React','PostgreSQL','Python']},{title:'Platform Engineer',company:'CloudScale',location:'Remote',match:78,salary:'130K–170K',skills:['Docker','AWS','JavaScript']}].map(j=>`<div class="job-card"><div class="job-header"><h4>${j.title}</h4><span class="match-pct">${j.match}% match</span></div><div class="job-meta">${j.company} · ${j.location} · $${j.salary}</div><div class="job-tags">${j.skills.map(s=>`<span class="job-tag">${s}</span>`).join('')}</div></div>`).join('');}
}

function renderSalary(el){
  el.innerHTML=`<div class="card"><h3>Salary Negotiator</h3>
    <div class="row"><div><label>Role</label><input type="text" id="salRole" value="Senior Software Engineer"></div>
    <div><label>Location</label><input type="text" id="salLoc" value="San Francisco"></div></div>
    <div class="row" style="margin-top:.3rem"><div><label>Offer Base Salary ($)</label><input type="number" id="salBase" value="165000"></div>
    <div><label>Years Experience</label><input type="number" id="salExp" value="6"></div></div>
    <div class="row" style="margin-top:.3rem"><div><label>Equity</label><input type="text" id="salEq" placeholder="e.g. 50K RSUs over 4 years"></div>
    <div><label>Bonus</label><input type="text" id="salBonus" placeholder="e.g. 15% annual target"></div></div>
    <div class="actions"><button class="btn btn-amber" onclick="negotiateSalary()">Get Negotiation Strategy</button><button class="btn btn-outline" onclick="aiSalaryAnalysis()">Deep AI Analysis</button></div>
    <div class="output" id="salOut"></div></div>`;
}

async function negotiateSalary(){
  const o=$('#salOut');o.textContent='Building negotiation strategy…';
  try{const r=await fetch(API+'/v1/salary/negotiate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_salary:+$('#salBase').value,equity:$('#salEq').value,bonus:$('#salBonus').value,role:$('#salRole').value,location:$('#salLoc').value,years_experience:+$('#salExp').value})});const d=await r.json();
    o.textContent=`Salary Negotiation Strategy\n${'━'.repeat(35)}\nCurrent Offer: $${d.current_offer.base.toLocaleString()}\nRecommended Counter: $${d.recommended_counter.toLocaleString()}\nConfidence: ${d.confidence_level}\n\nStrategies:\n${d.strategies.map(s=>`\n▸ ${s.strategy}\n  ${s.description}`).join('\n')}\n\nTalking Points:\n${d.talking_points.map(t=>'• '+t).join('\n')}${d.equity_notes.length?'\n\nEquity Notes:\n'+d.equity_notes.map(n=>'• '+n).join('\n'):''}`;
  }catch{o.textContent='Connect to API for negotiation strategies.';}
}

async function aiSalaryAnalysis(){
  const o=$('#salOut');o.textContent='Running AI compensation analysis…';
  try{const r=await fetch(API+'/v1/ai/salary-analysis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:$('#salRole').value,location:$('#salLoc').value,experience_years:+$('#salExp').value,offer_salary:+$('#salBase').value,skills:[]})});const d=await r.json();o.textContent=d.salary_analysis||d.error||'No response';}
  catch{o.textContent='Connect to API for AI salary analysis.';}
}

function renderChat(el){
  el.innerHTML=`<div class="card"><h3>AI Career Coach</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:.75rem">Get personalized career advice, skill gap analysis, and strategic guidance.</p>
    <div class="chat-box"><div class="chat-messages" id="chatMsgs"><div class="msg system">Hi! I'm your AI career coach. Ask me about career transitions, skill development, interview prep, salary negotiation, or anything career-related.</div></div>
    <div class="chat-input"><input type="text" id="chatIn" placeholder="Ask your career coach…" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-sm" onclick="sendChat()">Send</button></div></div></div>`;
  chatHistory.forEach(m=>{const d=ce('div','msg '+(m.role==='user'?'user':'ai'),m.text);$('#chatMsgs').appendChild(d);});
}

async function sendChat(){
  const inp=$('#chatIn'),txt=inp.value.trim();if(!txt)return;inp.value='';
  chatHistory.push({role:'user',text:txt});
  const msgs=$('#chatMsgs');msgs.appendChild(ce('div','msg user',txt));
  const thinking=ce('div','msg ai','<div class="loading"></div> Thinking…');msgs.appendChild(thinking);msgs.scrollTop=msgs.scrollHeight;
  try{
    const r=await fetch(API+'/v1/ai/career-advice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_role:'',skills:[],experience_years:0,interests:[],goals:txt})});
    const d=await r.json();const reply=d.career_advice||d.error||'No response';
    thinking.innerHTML=reply.replace(/\n/g,'<br>');chatHistory.push({role:'ai',text:reply});
  }catch{thinking.innerHTML='I\'m currently offline. Please ensure the LaunchPad server is running.';chatHistory.push({role:'ai',text:'Offline'});}
  msgs.scrollTop=msgs.scrollHeight;
}

async function checkHealth(){
  try{const r=await fetch(API+'/health');if(r.ok){$('#connDot').classList.add('ok');$('#connLabel').textContent='Connected';return;}}catch{}
  $('#connDot').classList.remove('ok');$('#connLabel').textContent='Offline';
}

initNav();renderTab(0);checkHealth();setInterval(checkHealth,15000);
</script>
