<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabMind — Scientific Research Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a24;--border:#252d44;
      --gold:#d4a843;--gold-dim:rgba(212,168,67,.15);
      --green:#10b981;--green-dim:rgba(16,185,129,.12);
      --indigo:#6366f1;--indigo-dim:rgba(99,102,241,.12);
      --text:#e2e4ea;--text-dim:#6a6a7a;--white:#fff;
      --red:#f87171;--amber:#fbbf24;
      --sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    input,select,textarea,button{font-family:inherit}

    header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface)}
    .logo{font-family:var(--mono);font-size:1.2rem;font-weight:600;color:var(--white)}.logo span{color:var(--gold)}
    .conn{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text-dim)}
    .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);transition:background .3s}
    .conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}

    .shell{max-width:960px;margin:0 auto;padding:0 1rem}
    nav{display:flex;gap:0;flex-wrap:wrap;margin:1rem 0;border-radius:8px;overflow-x:auto;border:1px solid var(--border);background:var(--surface)}
    nav button{flex:1;min-width:0;padding:.6rem .15rem;background:none;border:none;color:var(--text-dim);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
    nav button:hover{color:var(--text);background:var(--surface2)}
    nav button.active{background:var(--gold);color:var(--white)}

    .tab{display:none}.tab.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
    .card h3{font-size:.95rem;color:var(--gold);margin-bottom:.75rem;font-weight:600;font-family:var(--mono)}
    label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:.3rem;font-weight:500}
    input[type=text],input[type=number],textarea,select{width:100%;padding:.55rem .75rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;transition:border .2s;font-family:var(--sans)}
    input:focus,textarea:focus,select:focus{border-color:var(--gold)}
    textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:.8rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    .btn{padding:.55rem 1.1rem;background:var(--gold);color:var(--white);border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
    .btn:hover{filter:brightness(1.15)}.btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:.4rem .8rem;font-size:.75rem}
    .btn-indigo{background:var(--indigo)}
    .btn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold)}
    .btn-outline:hover{background:var(--gold-dim)}
    .actions{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
    .output{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-top:.75rem;font-family:var(--mono);font-size:.8rem;white-space:pre-wrap;line-height:1.7;max-height:500px;overflow-y:auto}
    .output:empty{display:none}

    .result-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.6rem;transition:border .2s}
    .result-card:hover{border-color:var(--gold)}
    .result-card h4{font-size:.88rem;color:var(--white);margin:0 0 .3rem}
    .result-card .score{font-size:.75rem;font-weight:600;color:var(--green)}
    .result-card p{font-size:.8rem;color:var(--text-dim);margin:.3rem 0 0}

    .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:.6rem}
    .stat-card h4{font-size:.85rem;color:var(--indigo);margin:0 0 .3rem;font-family:var(--mono)}
    .stat-card .desc{font-size:.8rem;color:var(--text-dim)}
    .stat-card .when{font-size:.75rem;color:var(--green);margin-top:.3rem;font-weight:600}

    .section-block{background:var(--surface2);border-left:3px solid var(--gold);padding:.8rem 1rem;border-radius:0 8px 8px 0;margin-bottom:.6rem}
    .section-block h4{font-size:.85rem;color:var(--white);margin:0 0 .2rem;font-family:var(--mono)}
    .section-block p{font-size:.8rem;color:var(--text-dim);margin:0}

    .chat-box{display:flex;flex-direction:column;height:440px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
    .msg{max-width:80%;padding:.6rem .9rem;border-radius:10px;font-size:.84rem;line-height:1.5}
    .msg.user{align-self:flex-end;background:var(--gold);color:var(--white);border-bottom-right-radius:3px}
    .msg.ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:3px}
    .msg.system{align-self:center;color:var(--text-dim);font-size:.75rem;font-style:italic}
    .chat-input{display:flex;gap:.5rem;padding:.75rem;border-top:1px solid var(--border);background:var(--surface2)}
    .chat-input input{flex:1;padding:.5rem .75rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.85rem;outline:none;font-family:var(--sans)}
    .chat-input input:focus{border-color:var(--gold)}

    .loading,.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{text-align:center;padding:2rem 1rem;color:var(--text-dim);font-size:.72rem;border-top:1px solid var(--border);margin-top:2rem}
    @media(max-width:640px){.row{grid-template-columns:1fr}nav{flex-wrap:wrap}nav button{flex:none;width:25%}}
    .scanlines{position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px)}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
</head>
<body>
  <div class="scanlines"></div>
<header>
  <div class="logo">Lab<span>Mind</span></div>
  <div class="conn"><div class="conn-dot" id="connDot"></div><span id="connLabel">Connecting…</span></div>
</header>
<div class="shell">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<footer>&copy; 2026 Mint Rail LLC &middot; LabMind v1.0.0</footer>
<script>
const API=localStorage.getItem('labmind_api')||(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1'?`${window.location.protocol}//${window.location.hostname}:8000`:window.location.origin);
const TABS=['Literature Search','Synthesis','Experiment Design','Hypothesis Generator','Stats Advisor','Paper Drafting','AI Research Assistant'];
let activeTab=0,chatHistory=[];

const $=s=>document.querySelector(s);
const ce=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h)e.innerHTML=h;return e};

function initNav(){
  const nav=$('#nav');
  TABS.forEach((t,i)=>{const b=ce('button','',t);if(i===0)b.classList.add('active');b.onclick=()=>switchTab(i);nav.appendChild(b);});
}
function switchTab(i){activeTab=i;document.querySelectorAll('nav button').forEach((b,j)=>b.classList.toggle('active',i===j));renderTab(i);}
function renderTab(i){const m=$('#main');m.innerHTML='';const d=ce('div','tab active');[renderLitSearch,renderSynthesis,renderExperiment,renderHypothesis,renderStats,renderPaper,renderChat][i](d);m.appendChild(d);}

function renderLitSearch(el){
  el.innerHTML=`<div class="card"><h3>// Literature Index</h3>
    <label>Add Documents to Index</label>
    <textarea id="litDocs" rows="5" placeholder="Paste paper abstracts or text, one per paragraph…">CRISPR-Cas9 gene editing has revolutionized molecular biology, enabling precise genome modifications. Recent advances in base editing and prime editing have expanded the toolkit, allowing single-nucleotide changes without double-strand breaks.

Machine learning approaches for protein structure prediction, exemplified by AlphaFold2, have achieved near-experimental accuracy. These methods leverage attention mechanisms and multiple sequence alignments to predict 3D protein conformations.

The gut microbiome's influence on mental health through the gut-brain axis involves multiple pathways including vagus nerve signaling, immune modulation, and metabolite production. Psychobiotics represent an emerging therapeutic approach.</textarea>
    <div class="actions"><button class="btn" onclick="addLitDocs()">Index Documents</button></div>
    <div class="output" id="litAddOut"></div></div>
    <div class="card"><h3>// Search Literature</h3>
    <label>Search Query</label><input type="text" id="litQuery" placeholder="e.g. protein structure prediction methods" value="gene editing techniques">
    <div class="row" style="margin-top:.3rem"><div><label>Results</label><input type="number" id="litK" value="5" min="1" max="20"></div><div></div></div>
    <div class="actions"><button class="btn" onclick="searchLit()">Search</button></div>
    <div id="litResults"></div></div>`;
}

async function addLitDocs(){
  const o=$('#litAddOut');o.textContent='Indexing documents…';
  const texts=$('#litDocs').value.split('\n\n').map(s=>s.trim()).filter(s=>s.length>20);
  if(!texts.length){o.textContent='Enter at least one document (paragraphs separated by blank lines).';return;}
  try{const r=await fetch(API+'/v1/literature/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texts})});const d=await r.json();o.textContent=`Indexed ${d.added} documents. Total in index: ${d.index_size}\nIDs: ${d.doc_ids.join(', ')}`;}
  catch{o.textContent=`Demo: Would index ${texts.length} documents. Connect to API for real indexing.`;}
}

async function searchLit(){
  const o=$('#litResults');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  try{const r=await fetch(API+'/v1/literature/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:$('#litQuery').value,k:+$('#litK').value})});const d=await r.json();
    if(!d.results.length){o.innerHTML='<div class="output">No results found. Add documents to the index first.</div>';return;}
    o.innerHTML=d.results.map(r=>{const s=r.snippet||r.text||'';return`<div class="result-card"><div style="display:flex;justify-content:space-between"><h4>Document ${r.doc_id}</h4><span class="score">Score: ${r.score.toFixed(3)}</span></div><p>${s.substring(0,200)}${s.length>200?'…':''}</p></div>`}).join('');
  }catch{o.innerHTML=[{id:'DOC-001',score:.892,text:'CRISPR-Cas9 gene editing has revolutionized molecular biology…'},{id:'DOC-002',score:.745,text:'Machine learning approaches for protein structure prediction…'},{id:'DOC-003',score:.631,text:'The gut microbiome\'s influence on mental health…'}].map(r=>`<div class="result-card"><div style="display:flex;justify-content:space-between"><h4>${r.id}</h4><span class="score">Score: ${r.score.toFixed(3)}</span></div><p>${r.text}</p></div>`).join('');}
}

function renderSynthesis(el){
  el.innerHTML=`<div class="card"><h3>// AI Literature Synthesis</h3>
    <label>Research Topic</label><input type="text" id="synTopic" value="CRISPR gene editing therapeutic applications">
    <label style="margin-top:.5rem">Paper Abstracts / Summaries (one per line)</label>
    <textarea id="synPapers" rows="6" placeholder="Paste paper abstracts to synthesize…">CRISPR-Cas9 shows promise for treating sickle cell disease with 90% editing efficiency in hematopoietic stem cells
Base editing enables correction of point mutations causing beta-thalassemia without inducing double-strand breaks
In vivo CRISPR delivery using lipid nanoparticles achieved therapeutic editing levels in primate liver cells
Clinical trial results for CRISPR-based treatment of transthyretin amyloidosis show sustained reduction in serum TTR levels</textarea>
    <label style="margin-top:.3rem">Focus Area (optional)</label><input type="text" id="synFocus" placeholder="e.g. clinical translation challenges">
    <div class="actions"><button class="btn" onclick="runSynthesis()">Synthesize with AI</button></div>
    <div class="output" id="synOut"></div></div>`;
}

async function runSynthesis(){
  const o=$('#synOut');o.textContent='Synthesizing literature…';
  const papers=$('#synPapers').value.split('\n').map(s=>s.trim()).filter(Boolean);
  try{const r=await fetch(API+'/v1/ai/synthesize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:$('#synTopic').value,papers,focus:$('#synFocus').value})});const d=await r.json();o.textContent=d.synthesis||d.error||'No response';}
  catch{o.textContent=`Demo Synthesis: ${$('#synTopic').value}\n${'━'.repeat(40)}\n\nThematic Summary:\nThe literature demonstrates converging evidence for CRISPR-based therapeutics across multiple disease models…\n\nConsensus:\n• High editing efficiency achievable in hematopoietic stem cells\n• Base editing offers safer alternative for point mutations\n\nGaps Identified:\n• Long-term safety data limited\n• Delivery optimization for in vivo applications\n\nConnect to API for full AI synthesis.`;}
}

function renderExperiment(el){
  el.innerHTML=`<div class="card"><h3>// Experiment Design</h3>
    <label>Research Question</label><textarea id="expRQ" rows="2">Does temperature affect the catalytic efficiency of enzyme X in breaking down substrate Y?</textarea>
    <label style="margin-top:.5rem">Hypothesis</label><input type="text" id="expH" value="Higher temperatures (up to 45°C) will increase catalytic rate following Arrhenius kinetics">
    <div class="row" style="margin-top:.5rem"><div><label>Independent Variables</label><textarea id="expIV" rows="2" placeholder="One per line">Temperature (25°C, 30°C, 35°C, 40°C, 45°C)</textarea></div>
    <div><label>Dependent Variables</label><textarea id="expDV" rows="2" placeholder="One per line">Reaction rate (µmol/min)\nSubstrate conversion (%)</textarea></div></div>
    <div class="row" style="margin-top:.3rem"><div><label>Expected Effect Size (Cohen's d)</label><input type="number" id="expES" value="0.5" step="0.1" min="0.1"></div>
    <div><label>Significance Level (α)</label><select id="expAlpha"><option value="0.05" selected>0.05</option><option value="0.01">0.01</option><option value="0.001">0.001</option></select></div></div>
    <div class="actions"><button class="btn" onclick="designExperiment()">Design Experiment</button><button class="btn btn-indigo" onclick="aiMethodology()">AI Methodology Review</button></div>
    <div class="output" id="expOut"></div></div>`;
}

async function designExperiment(){
  const o=$('#expOut');o.textContent='Designing experiment…';
  const ivs=$('#expIV').value.split('\n').filter(Boolean),dvs=$('#expDV').value.split('\n').filter(Boolean);
  try{const r=await fetch(API+'/v1/experiment/design',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({research_question:$('#expRQ').value,hypothesis:$('#expH').value,independent_vars:ivs,dependent_vars:dvs,expected_effect_size:+$('#expES').value,alpha:+$('#expAlpha').value,power:0.8})});const d=await r.json();o.textContent=JSON.stringify(d,null,2);}
  catch{o.textContent='Connect to API for experiment design.';}
}

async function aiMethodology(){
  const o=$('#expOut');o.textContent='AI is reviewing methodology…';
  try{const r=await fetch(API+'/v1/ai/methodology',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({research_question:$('#expRQ').value,proposed_method:$('#expH').value,constraints:[]})});const d=await r.json();o.textContent=d.methodology||d.error||'No response';}
  catch{o.textContent='Connect to API for AI methodology review.';}
}

function renderHypothesis(el){
  el.innerHTML=`<div class="card"><h3>// Hypothesis Generator</h3>
    <label>Observations (one per line)</label>
    <textarea id="hypObs" rows="5" placeholder="Describe your observations…">Enzyme activity increases with temperature up to 40°C then sharply declines
Adding substrate B at low concentrations enhances product yield but inhibits at high concentrations
Cell viability decreases linearly with radiation dose above 2 Gy</textarea>
    <div class="row" style="margin-top:.5rem"><div><label>Domain</label><select id="hypDomain"><option value="biochemistry">Biochemistry</option><option value="molecular_biology">Molecular Biology</option><option value="physics">Physics</option><option value="ecology">Ecology</option><option value="neuroscience">Neuroscience</option><option value="general">General</option></select></div>
    <div><label>Max Hypotheses</label><input type="number" id="hypMax" value="3" min="1" max="10"></div></div>
    <div class="actions"><button class="btn" onclick="genHypotheses()">Generate Hypotheses</button><button class="btn btn-indigo" onclick="aiHypothesis()">AI Refinement</button></div>
    <div id="hypOut"></div></div>`;
}

async function genHypotheses(){
  const o=$('#hypOut');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  const obs=$('#hypObs').value.split('\n').filter(Boolean);
  if(!obs.length){o.innerHTML='<div class="output">Enter at least one observation.</div>';return;}
  try{const r=await fetch(API+'/v1/hypothesis/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({observations:obs,domain:$('#hypDomain').value,max_hypotheses:+$('#hypMax').value})});const d=await r.json();
    o.innerHTML=d.hypotheses.map(h=>`<div class="section-block"><h4>H${h.id}: ${h.type.toUpperCase()}</h4><p style="color:var(--green)">${h.alternative_hypothesis}</p><p style="color:var(--amber);font-size:.78rem;margin-top:.2rem">${h.null_hypothesis}</p><p style="margin-top:.3rem">Design: ${h.suggested_design}</p></div>`).join('');
  }catch{o.innerHTML='<div class="output">Connect to API for hypothesis generation.</div>';}
}

async function aiHypothesis(){
  const o=$('#hypOut');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  const obs=$('#hypObs').value.split('\n').filter(Boolean);
  try{const r=await fetch(API+'/v1/ai/hypothesis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({observations:obs,domain:$('#hypDomain').value,existing_theories:[]})});const d=await r.json();o.innerHTML=`<div class="output">${d.hypotheses||d.error||'No response'}</div>`;}
  catch{o.innerHTML='<div class="output">Connect to API for AI hypothesis refinement.</div>';}
}

function renderStats(el){
  el.innerHTML=`<div class="card"><h3>// Statistical Advisor</h3>
    <label>Research Question</label><textarea id="statRQ" rows="2">Is there a significant difference in enzyme activity between the treatment and control groups?</textarea>
    <label style="margin-top:.5rem">Data Description</label><textarea id="statDesc" rows="2" placeholder="Describe your data…">Continuous measurements of enzyme activity (U/mg) in two independent groups, n=30 per group, approximately normally distributed</textarea>
    <div class="row" style="margin-top:.5rem"><div><label>Sample Size</label><input type="number" id="statN" value="60" min="2"></div>
    <div><label>Number of Groups</label><input type="number" id="statGroups" value="2" min="1"></div></div>
    <div class="row" style="margin-top:.3rem"><div><label>Data Type</label><select id="statType"><option value="continuous" selected>Continuous</option><option value="categorical">Categorical</option><option value="ordinal">Ordinal</option><option value="mixed">Mixed</option></select></div>
    <div><label>Paired Data?</label><select id="statPaired"><option value="false" selected>No (Independent)</option><option value="true">Yes (Paired/Repeated)</option></select></div></div>
    <label style="margin-top:.5rem">Variables (comma-separated)</label><input type="text" id="statVars" value="enzyme_activity, treatment_group, temperature">
    <div class="actions"><button class="btn" onclick="getStatsPlan()">Get Stats Plan</button><button class="btn btn-indigo" onclick="aiStatsAdvice()">AI Deep Analysis</button></div>
    <div id="statOut"></div></div>`;
}

async function getStatsPlan(){
  const o=$('#statOut');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  try{const r=await fetch(API+'/v1/stats/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sample_size:+$('#statN').value,groups:+$('#statGroups').value,data_type:$('#statType').value,paired:$('#statPaired').value==='true'})});const d=await r.json();
    o.innerHTML=(d.recommended_tests||[]).map(t=>`<div class="stat-card"><h4>${t.name||t.test}</h4><div class="desc">${t.use_case||t.description||''}</div><div class="when">When: ${t.when||'Based on your data characteristics'}</div></div>`).join('')+`<div class="output">${JSON.stringify(d,null,2)}</div>`;
  }catch{o.innerHTML=[{test:'Independent t-test',desc:'Compare means of two independent groups',when:'Normal data, equal variance, 2 groups'},{test:'Mann-Whitney U',desc:'Non-parametric alternative if normality violated',when:'Non-normal data, ordinal or continuous'},{test:"Welch's t-test",desc:'Does not assume equal variances',when:'Unequal variance between groups'}].map(t=>`<div class="stat-card"><h4>${t.test}</h4><div class="desc">${t.desc}</div><div class="when">When: ${t.when}</div></div>`).join('');}
}

async function aiStatsAdvice(){
  const o=$('#statOut');o.innerHTML='<div class="loading" style="margin:.5rem"></div>';
  const vars=$('#statVars').value.split(',').map(s=>s.trim()).filter(Boolean);
  try{const r=await fetch(API+'/v1/ai/stats-advisor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({research_question:$('#statRQ').value,data_description:$('#statDesc').value,sample_size:+$('#statN').value,variables:vars,data_type:$('#statType').value})});const d=await r.json();o.innerHTML=`<div class="output">${d.stats_advice||d.error||'No response'}</div>`;}
  catch{o.innerHTML='<div class="output">Connect to API for AI stats advice.</div>';}
}

function renderPaper(el){
  el.innerHTML=`<div class="card"><h3>// Paper Drafting</h3>
    <label>Paper Title</label><input type="text" id="papTitle" value="Temperature-Dependent Catalytic Efficiency of Enzyme X: A Kinetic Analysis">
    <div class="row" style="margin-top:.5rem"><div><label>Section to Draft</label><select id="papSection"><option value="introduction">Introduction</option><option value="methods">Methods</option><option value="results">Results</option><option value="discussion">Discussion</option></select></div>
    <div><label>Draft Method</label><select id="papMethod"><option value="ai">AI Draft</option><option value="template">Template</option></select></div></div>
    <label style="margin-top:.5rem">Key Points (one per line)</label>
    <textarea id="papPoints" rows="5">Enzyme X shows optimal activity at 40°C
Arrhenius plot reveals two distinct activation energy regimes
Thermal denaturation begins above 45°C as confirmed by CD spectroscopy
Km values decrease with temperature suggesting improved substrate binding
Results support a two-state model of thermal enzyme regulation</textarea>
    <label style="margin-top:.3rem">Additional Context</label><input type="text" id="papCtx" placeholder="e.g. target journal, related work…">
    <div class="actions"><button class="btn" onclick="draftPaper()">Draft Section</button></div>
    <div class="output" id="papOut"></div></div>`;
}

async function draftPaper(){
  const o=$('#papOut');o.textContent='Drafting section…';
  const points=$('#papPoints').value.split('\n').filter(Boolean);
  const method=$('#papMethod').value;
  if(method==='ai'){
    try{const r=await fetch(API+'/v1/ai/paper-draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:$('#papTitle').value,section:$('#papSection').value,key_points:points,context:$('#papCtx').value})});const d=await r.json();o.textContent=d.draft||d.error||'No response';}
    catch{o.textContent='Connect to API for AI paper drafting.';}
  }else{
    try{const r=await fetch(API+'/v1/paper/draft',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:$('#papTitle').value,authors:['Author'],abstract_summary:'Investigation of temperature-dependent enzyme kinetics',sections:[$('#papSection').value],key_findings:points})});const d=await r.json();
      const sec=d.sections[0];o.textContent=`${sec.heading}\n${'━'.repeat(40)}\n\n${sec.template}\n\nGuidance: ${sec.guidance}`;
    }catch{o.textContent='Connect to API for template generation.';}
  }
}

function renderChat(el){
  el.innerHTML=`<div class="card"><h3>// AI Research Assistant</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:.75rem">Ask about experimental design, statistical methods, literature interpretation, or any research question.</p>
    <div class="chat-box"><div class="chat-messages" id="chatMsgs"><div class="msg system">Hello, researcher! I'm your AI assistant with expertise across biology, chemistry, physics, and data science. How can I help with your research today?</div></div>
    <div class="chat-input"><input type="text" id="chatIn" placeholder="Ask a research question…" onkeydown="if(event.key==='Enter')sendChat()"><button class="btn btn-sm" onclick="sendChat()">Send</button></div></div></div>`;
  chatHistory.forEach(m=>{const html=m.role==='ai'&&typeof marked!=='undefined'?marked.parse(m.text):m.text;const d=ce('div','msg '+(m.role==='user'?'user':'ai'),html);$('#chatMsgs').appendChild(d);});
}

async function sendChat(){
  const inp=$('#chatIn'),txt=inp.value.trim();if(!txt)return;inp.value='';
  chatHistory.push({role:'user',text:txt});
  const msgs=$('#chatMsgs');msgs.appendChild(ce('div','msg user',txt));
  const thinking=ce('div','msg ai','<div class="loading"></div> Analyzing…');msgs.appendChild(thinking);msgs.scrollTop=msgs.scrollHeight;
  try{
    const r=await fetch(API+'/v1/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt})});
    const d=await r.json();const reply=d.response||d.error||'No response';
    thinking.innerHTML=typeof marked!=='undefined'?marked.parse(reply):reply.replace(/\n/g,'<br>');chatHistory.push({role:'ai',text:reply});
  }catch{thinking.innerHTML='I\'m currently offline. Please ensure the LabMind server is running.';chatHistory.push({role:'ai',text:'Offline'});}
  msgs.scrollTop=msgs.scrollHeight;
}

async function checkHealth(){
  try{const r=await fetch(API+'/health');if(r.ok){$('#connDot').classList.add('ok');$('#connLabel').textContent='Connected';return;}}catch{}
  $('#connDot').classList.remove('ok');$('#connLabel').textContent='Offline';
}

initNav();renderTab(0);checkHealth();setInterval(checkHealth,15000);
</script>
</body>
</html>
