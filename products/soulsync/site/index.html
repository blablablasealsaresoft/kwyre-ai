<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoulSync — Find Your Person. For Real.</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0810;--surface:#120f1a;--border:rgba(236,72,153,.12);--rose:#ec4899;--rose-dim:#be185d;--coral:#f472b6;--text:#ede9fe;--text-dim:#9ca3af;--radius:12px}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
    .app-shell{max-width:860px;margin:0 auto;padding:0 20px}
    header{padding:20px 0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .logo{font-size:1.3rem;font-weight:700;letter-spacing:-.02em;color:var(--rose)}
    .logo span{color:var(--text)}
    .conn-status{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--text-dim);letter-spacing:.5px}
    .conn-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0}
    .conn-dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e}
    nav{display:flex;gap:0;margin:16px 0 20px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
    nav button{flex:1;padding:10px 0;background:none;border:none;color:var(--text-dim);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    nav button.active{background:linear-gradient(135deg,var(--rose),var(--rose-dim));color:#fff}
    nav button:hover:not(.active){background:rgba(236,72,153,.06);color:var(--text)}
    .tab{display:none}.tab.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
    .card h3{font-size:1rem;font-weight:700;margin-bottom:10px;color:var(--coral)}
    label.q{display:block;margin-bottom:14px}
    label.q .q-text{display:block;font-size:.85rem;margin-bottom:6px;color:var(--text)}
    label.q .q-text .dim{font-size:.7rem;color:var(--text-dim);margin-left:6px}
    .likert{display:flex;gap:4px}
    .likert button{flex:1;padding:6px 0;border:1px solid var(--border);background:none;color:var(--text-dim);border-radius:6px;font-size:.75rem;cursor:pointer;transition:all .15s;font-family:inherit}
    .likert button.sel{background:var(--rose);border-color:var(--rose);color:#fff}
    .likert button:hover:not(.sel){background:rgba(236,72,153,.1)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:100px;font-weight:700;font-size:.9rem;border:none;cursor:pointer;transition:all .25s;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose-dim));color:#fff;box-shadow:0 4px 20px rgba(236,72,153,.25)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(236,72,153,.35)}
    .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-outline{background:none;border:1.5px solid var(--rose);color:var(--rose)}
    .btn-outline:hover{background:rgba(236,72,153,.1)}
    .result-section{margin-top:20px;animation:fadeIn .4s ease-out}
    .radar-wrap{display:flex;justify-content:center;padding:16px 0}
    .badge{display:inline-block;padding:6px 16px;border-radius:100px;font-size:.8rem;font-weight:600;background:rgba(236,72,153,.12);color:var(--coral);border:1px solid var(--border)}
    .values-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .values-list span{padding:4px 12px;border-radius:100px;font-size:.75rem;background:rgba(236,72,153,.08);color:var(--text-dim);border:1px solid rgba(236,72,153,.1)}
    .match-card{display:flex;gap:16px;align-items:center;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;transition:border-color .2s}
    .match-card:hover{border-color:var(--rose)}
    .match-pct{font-size:1.6rem;font-weight:800;color:var(--rose);min-width:60px;text-align:center}
    .match-info h4{font-size:.95rem;font-weight:700;margin-bottom:2px}
    .match-info p{font-size:.78rem;color:var(--text-dim)}
    .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .bar-label{font-size:.78rem;color:var(--text-dim);width:110px;flex-shrink:0;text-align:right}
    .bar-track{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--rose),var(--coral));transition:width .6s ease-out}
    .bar-val{font-size:.75rem;color:var(--text);width:36px;font-weight:600}
    .big-pct{font-size:4rem;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--rose),var(--coral));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:16px 0}
    .warn{padding:10px 14px;border-radius:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:.82rem;margin-top:10px}
    .ice-card{padding:16px;background:linear-gradient(135deg,rgba(236,72,153,.06),rgba(190,24,93,.04));border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;font-size:.88rem;line-height:1.5;color:var(--text)}
    .ice-card::before{content:'"';font-size:2rem;color:var(--rose);line-height:1;display:block;margin-bottom:4px}
    select,input[type=text]{width:100%;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;font-family:inherit;outline:none}
    select:focus,input[type=text]:focus{border-color:var(--rose)}
    .sel-label{font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;display:block}
    .row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .row>*{flex:1;min-width:180px}
    .error-box{padding:12px 16px;border-radius:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:.82rem;margin-top:12px}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    .help-box{margin-top:24px;padding:14px 18px;border-radius:10px;background:rgba(236,72,153,.04);border:1px solid var(--border);font-size:.78rem;color:var(--text-dim);line-height:1.6}
    .help-box code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-size:.75rem}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @media(max-width:600px){nav button{font-size:.72rem;padding:8px 0}.match-card{flex-direction:column;text-align:center}.bar-label{width:80px;font-size:.7rem}}
  </style>
</head>
<body>
<div class="app-shell">
  <header>
    <div class="logo">Soul<span>Sync</span></div>
    <div class="conn-status"><div class="conn-dot" id="connDot"></div><span id="connText">Disconnected</span></div>
  </header>
  <nav id="nav"></nav>
  <div id="tabContent"></div>
  <div class="help-box">
    <strong>Server:</strong> Start with <code>cd products/soulsync && python -m uvicorn main:app --reload</code> — API runs on <code>http://localhost:8000</code>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
const TABS = ['My Profile','Find Match','Compatibility','Icebreakers'];
let activeTab = 0, answers = {}, profileResult = null, matchResults = null, compatResult = null, iceResult = null;

const QUESTIONS = [
  {id:'o1',text:'I enjoy trying new and unusual activities',trait:'Openness'},
  {id:'o2',text:'I have a vivid imagination',trait:'Openness'},
  {id:'o3',text:'I prefer routine over surprise',trait:'Openness',rev:true},
  {id:'o4',text:'I appreciate art, music, or poetry deeply',trait:'Openness'},
  {id:'c1',text:'I keep my living space tidy and organized',trait:'Conscientiousness'},
  {id:'c2',text:'I follow through on plans I make',trait:'Conscientiousness'},
  {id:'c3',text:'I procrastinate on important tasks',trait:'Conscientiousness',rev:true},
  {id:'c4',text:'I set clear goals and work toward them',trait:'Conscientiousness'},
  {id:'e1',text:'I enjoy meeting new people',trait:'Extraversion'},
  {id:'e2',text:'I feel energized after social gatherings',trait:'Extraversion'},
  {id:'e3',text:'I prefer deep one-on-one conversations over parties',trait:'Extraversion',rev:true},
  {id:'e4',text:'I take charge in group settings',trait:'Extraversion'},
  {id:'a1',text:'I go out of my way to help others',trait:'Agreeableness'},
  {id:'a2',text:'I trust people until they give me a reason not to',trait:'Agreeableness'},
  {id:'a3',text:'I find it hard to forgive when someone wrongs me',trait:'Agreeableness',rev:true},
  {id:'a4',text:'I prioritize harmony over being right',trait:'Agreeableness'},
  {id:'n1',text:'I worry about things more than most people',trait:'Neuroticism'},
  {id:'n2',text:'I stay calm under pressure',trait:'Neuroticism',rev:true},
  {id:'at1',text:'I feel anxious when a partner seems distant',trait:'Attachment'},
  {id:'ll1',text:'Physical touch is the most meaningful way to show love',trait:'LoveLanguage'}
];

const LABELS = ['Strongly Disagree','Disagree','Neutral','Agree','Strongly Agree'];

function checkServer(){
  fetch(API+'/health').then(r=>{if(r.ok){setConn(true)}else setConn(false)}).catch(()=>setConn(false));
}
function setConn(ok){
  document.getElementById('connDot').className='conn-dot'+(ok?' ok':'');
  document.getElementById('connText').textContent=ok?'Connected':'Disconnected';
}

function renderNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=TABS.map((t,i)=>`<button class="${i===activeTab?'active':''}" onclick="switchTab(${i})">${t}</button>`).join('');
}

function switchTab(i){activeTab=i;renderNav();renderTab()}

function renderTab(){
  const c=document.getElementById('tabContent');
  if(activeTab===0) renderProfile(c);
  else if(activeTab===1) renderMatch(c);
  else if(activeTab===2) renderCompat(c);
  else renderIce(c);
}

function renderProfile(c){
  let h='<div class="tab active">';
  h+='<div class="card"><h3>Personality Questionnaire</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:16px">Rate each statement from 1 (Strongly Disagree) to 5 (Strongly Agree).</p>';
  QUESTIONS.forEach((q,i)=>{
    h+=`<label class="q"><span class="q-text">${i+1}. ${q.text}<span class="dim">${q.trait}${q.rev?' (R)':''}</span></span><div class="likert">`;
    for(let v=1;v<=5;v++) h+=`<button class="${answers[q.id]===v?'sel':''}" onclick="setAnswer('${q.id}',${v})">${v}</button>`;
    h+='</div></label>';
  });
  const done=Object.keys(answers).length===QUESTIONS.length;
  h+=`<button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="analyzeProfile()" ${done?'':'disabled'}><span>Analyze Profile</span></button></div>`;
  if(profileResult) h+=renderProfileResult();
  h+='</div>';
  c.innerHTML=h;
}

function setAnswer(id,v){answers[id]=v;renderTab()}

async function analyzeProfile(){
  const btn=document.querySelector('.btn-primary');
  btn.innerHTML='<span class="spinner"></span> Analyzing...';btn.disabled=true;
  try{
    const r=await fetch(API+'/v1/profile/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers})});
    if(!r.ok) throw new Error((await r.json()).detail||'Request failed');
    profileResult=await r.json();
  }catch(e){profileResult={error:e.message}}
  renderTab();
}

function renderProfileResult(){
  const p=profileResult;
  if(p.error) return `<div class="error-box">${p.error}</div>`;
  let h='<div class="result-section">';
  if(p.big_five||p.bigFive){
    const bf=p.big_five||p.bigFive||{};
    h+='<div class="card"><h3>Big Five Personality</h3><div class="radar-wrap"><canvas id="radarCanvas" width="280" height="280"></canvas></div></div>';
    setTimeout(()=>drawRadar(bf),50);
  }
  if(p.attachment_style||p.attachmentStyle){
    h+=`<div class="card"><h3>Attachment Style</h3><div class="badge">${p.attachment_style||p.attachmentStyle}</div></div>`;
  }
  if(p.love_language||p.loveLanguage){
    const ll=p.love_language||p.loveLanguage;
    h+='<div class="card"><h3>Love Language Ranking</h3>';
    if(Array.isArray(ll)) ll.forEach((l,i)=>{h+=`<div style="margin-bottom:4px"><span style="color:var(--rose);font-weight:700">${i+1}.</span> ${typeof l==='string'?l:l.name||l.language||JSON.stringify(l)}</div>`});
    else h+=`<p>${JSON.stringify(ll)}</p>`;
    h+='</div>';
  }
  if(p.values){
    h+='<div class="card"><h3>Core Values</h3><div class="values-list">';
    (Array.isArray(p.values)?p.values:[p.values]).forEach(v=>{h+=`<span>${typeof v==='string'?v:v.name||JSON.stringify(v)}</span>`});
    h+='</div></div>';
  }
  h+='</div>';
  return h;
}

function drawRadar(bf){
  const canvas=document.getElementById('radarCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d'),cx=140,cy=140,R=110;
  const traits=['Openness','Conscientiousness','Extraversion','Agreeableness','Neuroticism'];
  const vals=traits.map(t=>{const k=Object.keys(bf).find(k=>k.toLowerCase().startsWith(t.toLowerCase().slice(0,4)));return k?bf[k]/100:0.5});
  ctx.clearRect(0,0,280,280);
  for(let ring=1;ring<=5;ring++){
    ctx.beginPath();
    for(let i=0;i<=5;i++){
      const a=-Math.PI/2+i*(2*Math.PI/5),r=R*ring/5;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath();ctx.strokeStyle='rgba(236,72,153,'+(ring===5?.2:.08)+')';ctx.stroke();
  }
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*(2*Math.PI/5),r=R*v;
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  });
  ctx.closePath();ctx.fillStyle='rgba(236,72,153,.15)';ctx.fill();ctx.strokeStyle='#ec4899';ctx.lineWidth=2;ctx.stroke();
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*(2*Math.PI/5),r=R*v;
    ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),4,0,Math.PI*2);ctx.fillStyle='#ec4899';ctx.fill();
  });
  traits.forEach((t,i)=>{
    const a=-Math.PI/2+i*(2*Math.PI/5),lr=R+18;
    ctx.fillStyle='#9ca3af';ctx.font='11px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(t.slice(0,5),cx+lr*Math.cos(a),cy+lr*Math.sin(a));
  });
}

function renderMatch(c){
  let h='<div class="tab active"><div class="card"><h3>Find Your Match</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:14px">Discover compatible profiles from the match pool.</p>';
  h+='<button class="btn btn-primary" style="width:100%" onclick="findMatches()">Find Matches</button></div>';
  if(matchResults){
    if(matchResults.error) h+=`<div class="error-box">${matchResults.error}</div>`;
    else if(Array.isArray(matchResults)&&matchResults.length){
      matchResults.forEach(m=>{
        h+=`<div class="match-card"><div class="match-pct">${m.compatibility||m.score||'?'}%</div><div class="match-info"><h4>${m.name||'Profile'}</h4><p>${(m.top_traits||m.traits||[]).join(', ')||m.summary||''}</p></div><button class="btn btn-outline" style="padding:8px 16px;font-size:.78rem;flex-shrink:0" onclick="viewMatchDetail('${(m.id||m.name||'').replace(/'/g,"\\'")}')">View Details</button></div>`;
      });
    } else if(matchResults.matches){
      matchResults.matches.forEach(m=>{
        h+=`<div class="match-card"><div class="match-pct">${m.compatibility||m.score||'?'}%</div><div class="match-info"><h4>${m.name||'Profile'}</h4><p>${(m.top_traits||m.traits||[]).join(', ')||m.summary||''}</p></div></div>`;
      });
    } else h+=`<div class="card">${JSON.stringify(matchResults)}</div>`;
  }
  h+='</div>';c.innerHTML=h;
}

async function findMatches(){
  const btns=document.querySelectorAll('.btn-primary');
  btns.forEach(b=>{b.innerHTML='<span class="spinner"></span> Searching...';b.disabled=true});
  try{
    const body=profileResult&&!profileResult.error?{profile:profileResult}:{};
    const r=await fetch(API+'/v1/match/find',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok) throw new Error((await r.json()).detail||'Request failed');
    matchResults=await r.json();
  }catch(e){matchResults={error:e.message}}
  renderTab();
}

function viewMatchDetail(id){alert('Detail view for: '+id+'\n(Would open expanded profile in production)')}

function renderCompat(c){
  let h='<div class="tab active"><div class="card"><h3>Compatibility Score</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:14px">Compare two profiles to see how compatible they are.</p>';
  h+='<div class="row"><div><span class="sel-label">Profile A</span><input type="text" id="profA" placeholder="Name or ID..." value=""></div>';
  h+='<div><span class="sel-label">Profile B</span><input type="text" id="profB" placeholder="Name or ID..." value=""></div></div>';
  h+='<button class="btn btn-primary" style="width:100%" onclick="scoreCompat()">Score Compatibility</button></div>';
  if(compatResult){
    if(compatResult.error) h+=`<div class="error-box">${compatResult.error}</div>`;
    else{
      const cr=compatResult;
      h+='<div class="result-section">';
      h+=`<div class="card" style="text-align:center"><h3>Overall Compatibility</h3><div class="big-pct">${cr.overall||cr.score||cr.compatibility||'—'}%</div></div>`;
      const cats=[{label:'Values',weight:'30%',key:'values'},{label:'Personality',weight:'25%',key:'personality'},{label:'Attachment',weight:'20%',key:'attachment'},{label:'Love Language',weight:'15%',key:'love_language'},{label:'Deal-Breakers',weight:'10%',key:'deal_breakers'}];
      h+='<div class="card"><h3>Breakdown</h3>';
      const bk=cr.breakdown||cr.categories||cr;
      cats.forEach(cat=>{
        let val=bk[cat.key]||bk[cat.label]||bk[cat.label.toLowerCase()]||0;
        if(typeof val==='object') val=val.score||val.value||0;
        h+=`<div class="bar-row"><span class="bar-label">${cat.label} (${cat.weight})</span><div class="bar-track"><div class="bar-fill" style="width:${val}%"></div></div><span class="bar-val">${val}%</span></div>`;
      });
      h+='</div>';
      if(cr.warnings&&cr.warnings.length){
        h+='<div class="warn"><strong>Warnings:</strong><ul style="margin:6px 0 0 16px">';
        cr.warnings.forEach(w=>{h+=`<li>${typeof w==='string'?w:w.message||JSON.stringify(w)}</li>`});
        h+='</ul></div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';c.innerHTML=h;
}

async function scoreCompat(){
  const a=document.getElementById('profA').value.trim(),b=document.getElementById('profB').value.trim();
  if(!a||!b){alert('Enter both Profile A and Profile B');return}
  const btn=document.querySelector('.btn-primary');
  btn.innerHTML='<span class="spinner"></span> Scoring...';btn.disabled=true;
  try{
    const r=await fetch(API+'/v1/match/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_a:a,profile_b:b})});
    if(!r.ok) throw new Error((await r.json()).detail||'Request failed');
    compatResult=await r.json();
  }catch(e){compatResult={error:e.message}}
  renderTab();
}

function renderIce(c){
  let h='<div class="tab active"><div class="card"><h3>Generate Icebreakers</h3><p style="font-size:.8rem;color:var(--text-dim);margin-bottom:14px">Get personalized conversation starters based on shared interests and personality traits.</p>';
  h+='<div class="row"><div><span class="sel-label">Person A</span><input type="text" id="iceA" placeholder="Name or ID..."></div>';
  h+='<div><span class="sel-label">Person B</span><input type="text" id="iceB" placeholder="Name or ID..."></div></div>';
  h+='<button class="btn btn-primary" style="width:100%" onclick="genIce()">Generate Icebreakers</button></div>';
  if(iceResult){
    if(iceResult.error) h+=`<div class="error-box">${iceResult.error}</div>`;
    else{
      h+='<div class="result-section">';
      const items=iceResult.icebreakers||iceResult.starters||iceResult;
      if(Array.isArray(items)) items.forEach(ice=>{
        const txt=typeof ice==='string'?ice:ice.text||ice.starter||ice.question||JSON.stringify(ice);
        h+=`<div class="ice-card">${txt}</div>`;
      });
      else h+=`<div class="card">${JSON.stringify(iceResult)}</div>`;
      h+='</div>';
    }
  }
  h+='</div>';c.innerHTML=h;
}

async function genIce(){
  const a=document.getElementById('iceA').value.trim(),b=document.getElementById('iceB').value.trim();
  if(!a||!b){alert('Enter both names');return}
  const btn=document.querySelector('.btn-primary');
  btn.innerHTML='<span class="spinner"></span> Generating...';btn.disabled=true;
  try{
    const r=await fetch(API+'/v1/icebreaker/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({profile_a:a,profile_b:b})});
    if(!r.ok) throw new Error((await r.json()).detail||'Request failed');
    iceResult=await r.json();
  }catch(e){iceResult={error:e.message}}
  renderTab();
}

renderNav();renderTab();checkServer();setInterval(checkServer,10000);
</script>
</body>
</html>
