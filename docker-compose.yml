# Kwyre AI — single-command production deployment
# Usage:  docker compose up          (foreground)
#         docker compose up -d       (detached)
#
# Model weights are downloaded on first run and cached in the HF_CACHE volume.
# They are NEVER baked into the image.
#
# ── Windows (Docker Desktop + WSL2) ──────────────────────────────────────────
# Prerequisites for GPU support on Windows:
#   1. Install Docker Desktop with WSL2 backend enabled
#   2. Install NVIDIA GPU drivers for Windows (Game Ready or Studio)
#   3. Install NVIDIA Container Toolkit inside WSL2:
#        distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
#        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#        curl -s -L https://nvidia.github.io/libnvidia-container/$distribution/libnvidia-container.list | \
#          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
#          sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#        sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#   4. Restart Docker Desktop
#   5. Verify: docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi
# ─────────────────────────────────────────────────────────────────────────────

services:
  kwyre:
    build: .
    container_name: kwyre-inference
    env_file: .env

    environment:
      # GPU visibility (comma-separated IDs for multi-GPU, e.g. "0,1")
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}

      # API authentication — colon-separated key:role pairs, semicolon between entries
      - KWYRE_API_KEYS=${KWYRE_API_KEYS:-sk-kwyre-dev-local:admin}

      # Model configuration
      # Personal: Qwen/Qwen3.5-4B (3.9 GB VRAM) | Professional: Qwen/Qwen3.5-9B (7.5 GB VRAM)
      - KWYRE_MODEL=${KWYRE_MODEL:-Qwen/Qwen3.5-4B}
      - KWYRE_QUANT=${KWYRE_QUANT:-nf4}
      - KWYRE_SPECULATIVE=${KWYRE_SPECULATIVE:-1}
      - KWYRE_MERGE_LORA=${KWYRE_MERGE_LORA:-0}

      # License key (commercial deployments)
      - KWYRE_LICENSE_KEY=${KWYRE_LICENSE_KEY:-}

      # Tools are opt-in; default is air-gapped (no external HTTP requests)
      - KWYRE_ENABLE_TOOLS=${KWYRE_ENABLE_TOOLS:-0}

      # Disable torch.compile (not needed for inference, avoids dynamo bugs)
      - TORCHDYNAMO_DISABLE=1

      # Network binding — always 0.0.0.0 inside the container;
      # external access is restricted by the ports mapping below.
      - KWYRE_BIND_HOST=0.0.0.0

    ports:
      # Bind to loopback only — not exposed to the network
      - "127.0.0.1:8000:8000"

    volumes:
      # HuggingFace model cache (read-write so first-run download persists)
      - ${HF_CACHE:-./.cache/huggingface}:/workspace/.cache/huggingface
      # QAT / LoRA adapters (read-only; optional)
      - ${QAT_PATH:-./qat_output_v1/final}:/workspace/qat_output_v1/final:ro
      # License key file (read-only; optional — uncomment if you have a license)
      # - ./kwyre.license:/workspace/kwyre.license:ro

    # Modern compose GPU reservation (replaces deprecated "runtime: nvidia")
    # Works on both Linux (NVIDIA Container Toolkit) and Windows (Docker Desktop + WSL2)
    # For AMD ROCm on Linux, replace with: devices: ["/dev/kfd", "/dev/dri"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    shm_size: '8gb'
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
